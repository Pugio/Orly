steps:
  # Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/orly-backend"
      - "-f"
      - "infra/Dockerfile"
      - "."

  # Push to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/orly-backend"

  # Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "orly-backend"
      - "--image"
      - "gcr.io/$PROJECT_ID/orly-backend"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - "managed"
      - "--session-affinity"
      - "--min-instances=1"
      - "--timeout=3600"
      - "--allow-unauthenticated"
      - "--set-env-vars"
      - "GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_LOCATION=${_REGION}"

substitutions:
  _REGION: us-central1

images:
  - "gcr.io/$PROJECT_ID/orly-backend"
